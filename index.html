<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mindful — Track. Analyze. Master.</title>
    <link rel="icon" type="image/svg+xml" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Light Mode Colors */
        --bg: #f8fafc;
        --surface: #ffffff;
        --surface-highlight: #f1f5f9;
        --text: #0f172a;
        --text-muted: #64748b;
        --primary: #3b82f6;
        --accent: #8b5cf6;
        --success: #22c55e;
        --danger: #ef4444;
        --border: #e2e8f0;
        --sidebar-bg: #ede9f6;
      }

      .dark {
        /* Dark Mode Colors — navy-purple palette */
        --bg: #0d0b1a;
        --surface: #1a1625;
        --surface-highlight: #252136;
        --text: #e2e8f0;
        --text-muted: #94a3b8;
        --primary: #3b82f6;
        --accent: #8b5cf6;
        --success: #22c55e;
        --danger: #ef4444;
        --border: #332d4a;
        --sidebar-bg: #1e1535;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        transition: background-color 0.3s, color 0.3s;
      }

      /* Scrollbar Styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--surface); 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--text-muted); 
        border-radius: 4px;
        opacity: 0.5;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text); 
      }

      /* Tiptap Editor Styles */
      .ProseMirror {
        outline: none;
        min-height: 150px;
        color: var(--text);
        line-height: 1.6;
      }

      .ProseMirror p.is-editor-empty:first-child::before {
        color: var(--text-muted);
        content: attr(data-placeholder);
        float: left;
        height: 0;
        pointer-events: none;
        opacity: 0.5;
      }

      .ProseMirror ul {
        list-style-type: disc;
        padding-left: 1.5em;
        margin: 0.5em 0;
      }

      .ProseMirror ol {
        list-style-type: decimal;
        padding-left: 1.5em;
        margin: 0.5em 0;
      }

      .ProseMirror h1 {
        font-size: 1.5em;
        font-weight: 700;
        margin-top: 0.5em;
        margin-bottom: 0.25em;
      }

      .ProseMirror h2 {
        font-size: 1.25em;
        font-weight: 600;
        margin-top: 0.5em;
        margin-bottom: 0.25em;
      }

      .ProseMirror blockquote {
        border-left: 3px solid var(--primary);
        padding-left: 1em;
        margin-left: 0;
        color: var(--text-muted);
        font-style: italic;
      }

      .ProseMirror code {
        background-color: var(--surface-highlight);
        padding: 0.2em 0.4em;
        border-radius: 4px;
        font-family: monospace;
        font-size: 0.9em;
      }
      
      .ProseMirror a {
        color: var(--primary);
        text-decoration: underline;
        cursor: pointer;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeIn {
        animation: fadeIn 0.6s ease-out;
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              background: 'var(--bg)',
              surface: 'var(--surface)',
              surfaceHighlight: 'var(--surface-highlight)',
              sidebarBg: 'var(--sidebar-bg)',
              primary: 'var(--primary)',
              accent: 'var(--accent)',
              success: 'var(--success)',
              danger: 'var(--danger)',
              text: 'var(--text)',
              textMuted: 'var(--text-muted)',
            }
          }
        }
      }
    </script>
